// === INPUT HANDLER ===
document.addEventListener('keydown', e => {
    const k = e.key;
    if (k === 'ArrowUp' || k === 'w') { keysHeld.up = true; e.preventDefault(); }
    if (k === 'ArrowDown' || k === 's') { keysHeld.down = true; e.preventDefault(); }
    if (k === 'ArrowLeft' || k === 'a') { keysHeld.left = true; e.preventDefault(); }
    if (k === 'ArrowRight' || k === 'd') { keysHeld.right = true; e.preventDefault(); }
    if (k === 'Enter') { keysPressed.enter = true; e.preventDefault(); }
    if (k === ' ') { keysPressed.space = true; e.preventDefault(); }
    if (k === 'Escape' || k === 'p' || k === 'P') { keysPressed.escape = true; }
    // Text input for name entry
    if (gameScreen === SCREENS.INTRO && intro.showName && !intro.showGoodluck) {
        if (k === 'Backspace') {
            intro.nameInput = intro.nameInput.slice(0, -1);
        } else if (k.length === 1 && intro.nameInput.length < 18) {
            intro.nameInput += k;
        }
    }
});
document.addEventListener('keyup', e => {
    const k = e.key;
    if (k === 'ArrowUp' || k === 'w') keysHeld.up = false;
    if (k === 'ArrowDown' || k === 's') keysHeld.down = false;
    if (k === 'ArrowLeft' || k === 'a') keysHeld.left = false;
    if (k === 'ArrowRight' || k === 'd') keysHeld.right = false;
});
canvas.addEventListener('click', e => {
    initAudio();
    const rect = canvas.getBoundingClientRect();
    const scaleX = CONFIG.canvasWidth / rect.width;
    const scaleY = CONFIG.canvasHeight / rect.height;
    const cx = (e.clientX - rect.left) * scaleX;
    const cy = (e.clientY - rect.top) * scaleY;
    if (gameScreen === SCREENS.BATTLE) { handleBattleClick(cx, cy); return; }
    if (gameScreen === SCREENS.TITLE) {
        // Click on New Game / Continue
        [0,1].forEach(i => {
            const bx = 300, by = 330 + i * 70, bw = 200, bh = 44;
            if (cx >= bx && cx <= bx + bw && cy >= by && cy <= by + bh) {
                const disabled = i === 1 && !hasSave;
                if (!disabled) {
                    titleSel = i;
                    sfx.menuConfirm();
                    if (i === 0) {
                        gameScreen = SCREENS.INTRO;
                        intro = { stage: 0, charIdx: 0, lastCharTime: performance.now(), lines: intro.lines, nameInput: '', showName: false, goodluckTimer: 0, showGoodluck: false };
                    } else {
                        loadGame();
                    }
                }
            }
        });
    } else if (gameScreen === SCREENS.INTRO) {
        introPresetClick(cx, cy);
    }
});
// === MAIN GAME LOOP ===
let lastFrame = 0;
function loop(now) {
    const dt = now - lastFrame;
    lastFrame = now;

    // --- UPDATE ---

    // Pause save message timer
    if (pauseSaveMsgTimer > 0) {
        pauseSaveMsgTimer -= dt;
        if (pauseSaveMsgTimer <= 0) pauseSaveMsg = '';
    }

    // Screen-specific UPDATE
    if (gameScreen === SCREENS.BATTLE) {
        handleBattleInput(now);
    } else if (gameScreen === SCREENS.BATTLE_TRANSITION) {
        updateBattleTransition(now);
    } else if (gameScreen === SCREENS.BLACKOUT) {
        updateBlackout(now);
    } else if (gameScreen === SCREENS.REGION_TRANSITION) {
        updateRegionTransition(now);
    } else if (gameScreen === SCREENS.VICTORY) {
        if (keysPressed.enter || keysPressed.space) {
            keysPressed.enter = false; keysPressed.space = false;
            gameScreen = SCREENS.OVERWORLD;
        }
    } else if (pauseOpen) {
        if (pauseSubscreen) {
            // Subscreen is open -- only handle escape to go back
            if (keysPressed.escape) {
                keysPressed.escape = false;
                pauseSubscreen = null;
                sfx.menuSelect();
            }
        } else {
            // Normal pause menu navigation
            if (keysPressed.escape) {
                keysPressed.escape = false;
                pauseOpen = false;
                sfx.menuSelect();
            }
            if (keysPressed.enter || keysPressed.space) {
                keysPressed.enter = false; keysPressed.space = false;
                handlePauseConfirm();
            }
            if (keysHeld.up && now - lastMoveTime > CONFIG.moveDelay) {
                pauseSel = (pauseSel - 1 + PAUSE_OPTS.length) % PAUSE_OPTS.length;
                sfx.menuSelect(); lastMoveTime = now;
            }
            if (keysHeld.down && now - lastMoveTime > CONFIG.moveDelay) {
                pauseSel = (pauseSel + 1) % PAUSE_OPTS.length;
                sfx.menuSelect(); lastMoveTime = now;
            }
        }
    } else if (gameScreen === SCREENS.TITLE) {
        if (keysHeld.up && now - lastMoveTime > CONFIG.moveDelay) {
            titleSel = 0; sfx.menuSelect(); lastMoveTime = now;
        }
        if (keysHeld.down && now - lastMoveTime > CONFIG.moveDelay) {
            titleSel = 1; sfx.menuSelect(); lastMoveTime = now;
        }
        if (keysPressed.enter || keysPressed.space) {
            keysPressed.enter = false; keysPressed.space = false;
            sfx.menuConfirm();
            if (titleSel === 0) {
                gameScreen = SCREENS.INTRO;
                intro = { stage: 0, charIdx: 0, lastCharTime: now, lines: ["The world's politicians are out of control.", "Only one lobbyist can unite them all.", "That lobbyist is..."], nameInput: '', showName: false, goodluckTimer: 0, showGoodluck: false };
            } else if (titleSel === 1 && hasSave) {
                loadGame();
            }
        }
    } else if (gameScreen === SCREENS.INTRO) {
        updateIntro(now);
        if (keysPressed.enter || keysPressed.space) {
            keysPressed.enter = false; keysPressed.space = false;
            advanceIntro();
        }
    } else if (gameScreen === SCREENS.OVERWORLD || gameScreen === SCREENS.LOBBY_HQ) {
        if (shopOpen) {
            // Shop takes total priority — only handleShopInput runs (escape handled internally)
            handleShopInput(now);
        } else {
            // Escape toggles pause only when shop is closed
            if (keysPressed.escape) {
                keysPressed.escape = false;
                pauseOpen = !pauseOpen;
                if (!pauseOpen) pauseSubscreen = null;
                sfx.menuSelect();
            }
            updateDialogue(now);
            // Interaction key
            if (keysPressed.enter || keysPressed.space) {
                keysPressed.enter = false; keysPressed.space = false;
                checkInteract();
            }
            // Movement: throttled, one step per moveDelay ms
            if (!dlg.active && now - lastMoveTime >= CONFIG.moveDelay) {
                let moved = false;
                if (keysHeld.up)    { playerDirection = 'up';    moved = tryMove(0, -1); }
                if (keysHeld.down)  { playerDirection = 'down';  moved = tryMove(0, 1); }
                if (keysHeld.left)  { playerDirection = 'left';  moved = tryMove(-1, 0); }
                if (keysHeld.right) { playerDirection = 'right'; moved = tryMove(1, 0); }
                if (moved) lastMoveTime = now;
            }
        }
        // Idle bob and camera always update
        const idleMs = 800;
        if (now - lastIdleBobTime > idleMs) {
            playerIdleBob = Math.floor((now - lastIdleBobTime) / (idleMs / 2)) % 2 === 1;
        }
        updateCamera();
    }

    // --- DRAW ---
    ctx.fillStyle = COLORS.black;
    ctx.fillRect(0, 0, CONFIG.canvasWidth, CONFIG.canvasHeight);

    if (gameScreen === SCREENS.BATTLE) {
        drawBattle(now);
    } else if (gameScreen === SCREENS.BLACKOUT) {
        drawBlackout(now);
    } else if (gameScreen === SCREENS.BATTLE_TRANSITION) {
        // Draw overworld underneath, then flash transition on top
        drawOverworld(now);
        drawBattleTransition(now);
    } else if (gameScreen === SCREENS.REGION_TRANSITION) {
        drawRegionTransition(now);
    } else if (gameScreen === SCREENS.VICTORY) {
        drawVictoryScreen(now);
    } else if (gameScreen === SCREENS.TITLE) {
        drawTitle(now);
    } else if (gameScreen === SCREENS.INTRO) {
        drawIntro(now);
    } else if (gameScreen === SCREENS.OVERWORLD || gameScreen === SCREENS.LOBBY_HQ) {
        // Draw world (tiles + boss sprites + player)
        drawOverworld(now);
        // HUD
        drawHUD();
        // Dialogue
        drawDialogue();
        if (shopOpen) drawShop();
        // Pause overlay
        drawPauseMenu();
    }

    requestAnimationFrame(loop);
}
// === INIT ===
requestAnimationFrame(loop);
